name: End-to-End Install Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published version to test (defaults to latest)"
        required: false
        default: "latest"

env:
  FEYNMAN_VERSION_INPUT: ${{ github.event.inputs.version || 'latest' }}

jobs:
  install-e2e:
    name: e2e (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24
          - os: macos-14
            node: 24
          - os: windows-latest
            node: 24
          - os: windows-latest
            node: 25
          - os: ubuntu-latest
            node: 25
    runs-on: ${{ matrix.os }}
    env:
      HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install published package globally
        # Issue #177 regression: this must succeed on every supported Node,
        # including the newest major — a failing preinstall used to roll the
        # install back and pin users to the previous version.
        run: npm install -g "@companion-ai/feynman@${FEYNMAN_VERSION_INPUT}"

      - name: feynman --version
        run: |
          set -x
          feynman --version
          installed="$(feynman --version | tail -1)"
          expected="$(npm view "@companion-ai/feynman@${FEYNMAN_VERSION_INPUT}" version | tail -1)"
          if [ "$installed" != "$expected" ]; then
            echo "version mismatch: installed=$installed expected=$expected" >&2
            exit 1
          fi

      - name: feynman packages list / update / search status
        run: |
          feynman packages list
          feynman update
          feynman search status

      - name: Assert pi-subagents spawn patch applied (issue 172)
        # Running the CLI above applies launch-time patches to the bundled
        # workspace. The patched pi-spawn must prefer FEYNMAN_PI_CLI_PATH so
        # subagents never treat --mode as a module path.
        run: |
          node -e '
            const { execSync } = require("node:child_process");
            const { existsSync, readFileSync } = require("node:fs");
            const { join } = require("node:path");
            const root = execSync("npm root -g").toString().trim();
            const pkg = join(root, "@companion-ai", "feynman");
            const candidates = [
              join(pkg, ".feynman", "npm", "node_modules", "pi-subagents", "src", "runs", "shared", "pi-spawn.ts"),
              join(pkg, ".feynman", "npm", "node_modules", "pi-subagents", "pi-spawn.ts"),
            ];
            const found = candidates.filter((p) => existsSync(p));
            if (found.length === 0) throw new Error("pi-spawn source not found under " + pkg);
            const patched = found.filter((p) => readFileSync(p, "utf8").includes("FEYNMAN_PI_CLI_PATH"));
            if (patched.length === 0) throw new Error("pi-spawn patch NOT applied to any of: " + found.join(", "));
            console.log("pi-spawn patch applied:", patched.join(", "));
          '

      - name: Assert alpha-hub structured search parser applied (issue 167)
        run: |
          node -e '
            const { execSync } = require("node:child_process");
            const { existsSync, readFileSync } = require("node:fs");
            const { join } = require("node:path");
            const root = execSync("npm root -g").toString().trim();
            const pkg = join(root, "@companion-ai", "feynman");
            const candidates = [
              join(pkg, "node_modules", "@companion-ai", "alpha-hub", "src", "lib", "index.js"),
              join(pkg, ".feynman", "npm", "node_modules", "@companion-ai", "alpha-hub", "src", "lib", "index.js"),
            ];
            const found = candidates.filter((p) => existsSync(p));
            if (found.length === 0) throw new Error("alpha-hub index.js not found under " + pkg);
            const patched = found.filter((p) => readFileSync(p, "utf8").includes("parseStructuredSearchResults"));
            if (patched.length !== found.length) {
              throw new Error("structured search parser patch missing on: " + found.filter((p) => !patched.includes(p)).join(", "));
            }
            console.log("alpha-hub structured parser applied:", patched.join(", "));
          '

      - name: Configure model auth for live smokes
        if: env.HAS_OPENAI_KEY == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export FEYNMAN_HOME="$RUNNER_TEMP/feynman-home"
          mkdir -p "$FEYNMAN_HOME/.feynman/agent"
          node -e '
            const { writeFileSync, mkdirSync } = require("node:fs");
            const { join } = require("node:path");
            const home = join(process.env.RUNNER_TEMP, "feynman-home", ".feynman", "agent");
            mkdirSync(home, { recursive: true });
            writeFileSync(join(home, "auth.json"), JSON.stringify({ openai: { type: "api_key", key: process.env.OPENAI_API_KEY } }));
            writeFileSync(join(home, "settings.json"), JSON.stringify({ defaultProvider: "openai", defaultModel: "gpt-4.1-mini", quietStartup: true }));
          '
          echo "FEYNMAN_HOME=$RUNNER_TEMP/feynman-home" >> "$GITHUB_ENV"

      - name: Live model smoke (one-shot prompt)
        if: env.FEYNMAN_HOME != ''
        run: |
          feynman --mode json --prompt 'Reply with exactly CI_OK and nothing else. Do not call any tools.' > smoke.log 2>&1 || { tail -50 smoke.log; exit 1; }
          grep -q "CI_OK" smoke.log
          echo "model smoke ok"

      - name: Live model smoke (text mode)
        if: env.FEYNMAN_HOME != ''
        run: |
          feynman --prompt 'Reply with exactly CI_TEXT_OK and nothing else. Do not call any tools.' > smoke-text.log 2>&1 || { tail -50 smoke-text.log; exit 1; }
          grep -q "CI_TEXT_OK" smoke-text.log
          echo "text mode smoke ok"

      - name: Subagent spawn diagnostics
        if: env.FEYNMAN_HOME != ''
        run: |
          node -e '
            const { execSync } = require("node:child_process");
            const { existsSync, readFileSync } = require("node:fs");
            const { join } = require("node:path");
            const root = execSync("npm root -g").toString().trim();
            const pkg = join(root, "@companion-ai", "feynman");
            const spawnPath = join(pkg, ".feynman", "npm", "node_modules", "pi-subagents", "src", "runs", "shared", "pi-spawn.ts");
            const src = existsSync(spawnPath) ? readFileSync(spawnPath, "utf8") : "";
            console.log("pi-spawn exists:", existsSync(spawnPath));
            console.log("has FEYNMAN_PI_CLI_PATH:", src.includes("FEYNMAN_PI_CLI_PATH"));
            console.log("has wrapperPiCliPath recovery:", src.includes("wrapperPiCliPath"));
            console.log("has argv2 dep:", src.includes("argv2?: string;"));
            for (const candidate of [
              join(pkg, "node_modules", "@earendil-works", "pi-coding-agent", "dist", "cli.js"),
              join(pkg, ".feynman", "npm", "node_modules", "@earendil-works", "pi-coding-agent", "dist", "cli.js"),
              join(pkg, "dist", "pi", "pi-cli-wrapper.js"),
            ]) console.log("exists:", existsSync(candidate), candidate);
            const agentsPath = join(pkg, ".feynman", "npm", "node_modules", "pi-subagents", "src", "agents", "agents.ts");
            const agents = existsSync(agentsPath) ? readFileSync(agentsPath, "utf8") : "";
            const used = (agents.match(/loadAgentsFromDir\(userDir, "user"\)/g) ?? []).length;
            const declared = (agents.match(/const userDir = /g) ?? []).length;
            console.log("agents.ts userDir used:", used, "declared:", declared);
          '

      - name: Instrument pi-spawn for runtime evidence
        if: env.FEYNMAN_HOME != ''
        run: |
          node -e '
            const { execSync } = require("node:child_process");
            const { readFileSync, writeFileSync, existsSync } = require("node:fs");
            const { join } = require("node:path");
            const root = execSync("npm root -g").toString().trim();
            const spawnPath = join(root, "@companion-ai", "feynman", ".feynman", "npm", "node_modules", "pi-subagents", "src", "runs", "shared", "pi-spawn.ts");
            if (!existsSync(spawnPath)) { console.log("no pi-spawn to instrument"); process.exit(0); }
            let src = readFileSync(spawnPath, "utf8");
            const anchor = "export function getPiSpawnCommand(args: string[], deps: PiSpawnDeps = {}): PiSpawnCommand {";
            if (!src.includes(anchor)) { console.log("anchor missing; layout differs"); process.exit(0); }
            src = src.replace(anchor, anchor + "\n\tconsole.error(\"[pi-spawn-diag]\", JSON.stringify({ platform: deps.platform ?? process.platform, env: process.env.FEYNMAN_PI_CLI_PATH ?? null, argv1: deps.argv1 ?? process.argv[1] ?? null, argv2: deps.argv2 ?? process.argv[2] ?? null }));");
            const ret = "\treturn { command: \"pi\", args };";
            src = src.replace(ret, "\tconsole.error(\"[pi-spawn-diag-fallthrough]\", \"returning bare pi\");\n" + ret);
            writeFileSync(spawnPath, src);
            console.log("instrumented", spawnPath);
          '

      - name: Live subagent smoke (issue 172 end-to-end)
        if: env.FEYNMAN_HOME != ''
        run: |
          feynman --mode json --prompt 'Use the subagent tool to run the "researcher" agent with the task: Reply with the single word PONG and stop. After the subagent returns, reply with exactly RESULT=<the single word the subagent returned> and nothing else.' > subagent.log 2>&1 || { tail -80 subagent.log; exit 1; }
          for marker in "Cannot find module" "is not defined"; do
            if grep -q "$marker" subagent.log; then
              echo "subagent regression detected (matched: $marker):" >&2
              grep -n "$marker" subagent.log | head -3 >&2
              exit 1
            fi
          done
          # RESULT=PONG can only appear if the child actually ran and returned
          # its reply; a failed tool call makes the parent relay an error word.
          grep -o "\[pi-spawn-diag[^\\]*" subagent.log | head -5 || true
          grep -q "RESULT=PONG" subagent.log || { echo "child output not relayed:" >&2; grep -o "RESULT=[A-Za-z_]*" subagent.log >&2; tail -30 subagent.log >&2; exit 1; }
          echo "subagent smoke ok"
